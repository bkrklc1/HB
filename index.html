<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Kitty'nin Sayfası</title>
    <style>
        body {
            background-color: #ffc0cb; /* Pembe arka plan */
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        /* Şifre ekranı stilleri */
        #lockScreen {
            text-align: center;
            padding: 50px;
            color: #333;
        }

        /* Ana içerik başlangıçta gizli */
        #content {
            display: none; 
        }

        h1 {
            color: #ff69b4;
            text-align: center;
            margin-top: 20px;
        }

        /* Galeri stilleri */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .gallery img {
            max-width: 300px;
            height: auto;
            border: 5px solid white;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }
    </style>
    <script>
        function checkPassword() {
            // Tarayıcı açıldığında sorulacak sorular
            const username = prompt("Lütfen kullanıcı adını girin:");
            const password = prompt("Lütfen şifreyi girin:");

            // Kullanıcı adı ve şifreyi kontrol et
            if (username === "HB" && password === "1607") { 
                document.getElementById("content").style.display = "block"; // Galeriyi göster
                document.getElementById("lockScreen").style.display = "none"; // Uyarı metnini gizle
            } else {
                alert("Yanlış kullanıcı adı veya şifre!"); // Hatalı giriş
                location.reload(); // Sayfayı başa sar
            }
        }
    </script>
</head>
<body onload="checkPassword()">

    <div id="lockScreen">
        <h1>Sayfa Koruma Altında</h1>
        <p>Lütfen doğru kullanıcı adı ve şifreyi girin.</p>
    </div>

    <div id="content">
        <h1>Hello Kitty ve Batman'in Sayfasına Hoş Geldiniz!</h1>
        
        <div class="gallery">
            <img src="https://raw.githubusercontent.com/bkrklc1/HB/main/fffba7541fbd6ba55484df3101ef658a.jpg" alt="Hello Kitty">
            <img src="https://raw.githubusercontent.com/bkrklc1/HB/main/4e56bd918b10c91dbfb135f0eb912145.jpg" alt="Batman">
            <img src="https://raw.githubusercontent.com/bkrklc1/HB/main/WhatsApp%20Image%202025-04-14%20at%2010.52.43%20(1).jpeg" alt="Fotoğraf 3">
            <img src="https://raw.githubusercontent.com/bkrklc1/HB/main/WhatsApp%20Image%202025-04-14%20at%2010.52.43.jpeg" alt="Fotoğraf 4">
            <img src="https://raw.githubusercontent.com/bkrklc1/HB/main/WhatsApp%20Image%202025-04-14%20at%2010.52.44%20(1).jpeg" alt="Fotoğraf 5">
        </div>
    </div>

</body>
</html>
