<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Kitty ve Batman'in Sayfası</title>
    <style>
        /* Arka Plan */
        body {
            background-color: #ffc0cb; /* Pembe arka plan */
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        /* Başlık Stili */
        h1 {
            color: #ff69b4; /* Daha koyu pembe */
            text-align: center;
            margin-top: 20px;
        }

        /* Fotoğraf Galerisi */
        .gallery {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        .gallery img {
            max-width: 300px;
            height: auto;
            border: 5px solid white;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Hello Kitty ve Batman'in Sayfası</h1>
    <div class="gallery">
        <!-- Hello Kitty Fotoğrafı -->
        <img src="https://raw.githubusercontent.com/bkrklc1/HB/main/fffba7541fbd6ba55484df3101ef658a.jpg" alt="Hello Kitty">
        
        <!-- Batman Fotoğrafı -->
        <img src="https://raw.githubusercontent.com/bkrklc1/HB/main/4e56bd918b10c91dbfb135f0eb912145.jpg" alt="Batman">
    </div>
</body>
</html>
